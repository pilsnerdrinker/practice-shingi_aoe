<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>真偽AoE判断 練習アプリ</title>
<style>
:root{
  --bg:#0f1420;
  --panel:#171d2b;
  --panel2:#20283a;
  --text:#f3f6ff;
  --muted:#aeb8d0;
  --line:#3b465f;
  --accent:#8fd3ff;
  --accent2:#72d6ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  background:radial-gradient(circle at top,#22304a 0,#0f1420 48%,#080b12 100%);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.wrap{
  max-width:1280px;
  margin:0 auto;
  padding:18px 12px 34px;
}
.header{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  flex-wrap:wrap;
  margin-bottom:12px;
}
h1{
  font-size:clamp(24px,4vw,38px);
  margin:0 0 6px;
}
.lead{
  color:var(--muted);
  line-height:1.6;
  margin:0;
  font-size:14px;
}
.controls{
  background:rgba(23,29,43,.94);
  border:1px solid rgba(255,255,255,.09);
  border-radius:18px;
  padding:12px;
  display:grid;
  gap:10px;
  box-shadow:0 10px 28px rgba(0,0,0,.24);
}
.controlRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.label{
  color:var(--muted);
  font-weight:800;
  font-size:13px;
  min-width:64px;
}
button, a.openLink{
  border:1px solid rgba(255,255,255,.1);
  background:var(--panel2);
  color:var(--text);
  border-radius:999px;
  padding:10px 14px;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
  font-size:14px;
}
button:hover, a.openLink:hover{filter:brightness(1.1)}
button.active{
  background:linear-gradient(135deg,#4f8cff,#72d6ff);
  color:#07111f;
}
.status{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
  margin:12px 0;
  color:var(--muted);
  font-size:13px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 10px;
  border-radius:999px;
  background:rgba(32,40,58,.9);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  font-weight:900;
}
.frameShell{
  background:rgba(23,29,43,.75);
  border:1px solid rgba(255,255,255,.09);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 16px 36px rgba(0,0,0,.3);
}
iframe{
  display:block;
  width:100%;
  height:calc(100vh - 190px);
  min-height:760px;
  border:0;
  background:#0f1420;
}
.footer{
  margin-top:12px;
  padding:12px 14px;
  border:1px solid var(--line);
  border-radius:16px;
  color:var(--muted);
  line-height:1.7;
  background:rgba(15,20,32,.76);
  font-size:12px;
}
@media(max-width:760px){
  .controls{width:100%}
  .label{width:100%;min-width:0}
  button, a.openLink{flex:1}
  iframe{height:calc(100vh - 250px);min-height:680px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>真偽AoE判断 練習アプリ</h1>
      <p class="lead">
        Roundを選んで、ノーマル/ハードをボタンで切り替えます。
      </p>
    </div>

    <div class="controls" aria-label="練習メニュー">
      <div class="controlRow">
        <div class="label">Round</div>
        <button id="round1" data-round="1">Round 1</button>
        <button id="round2" data-round="2">Round 2</button>
        <button id="round3" data-round="3">Round 3</button>
      </div>
      <div class="controlRow">
        <div class="label">Mode</div>
        <button id="normal" data-mode="normal">ノーマル</button>
        <button id="hard" data-mode="hard">ハード</button>
        <a class="openLink" id="openLink" href="normal/round1.html" target="_blank" rel="noopener">別タブで開く</a>
      </div>
    </div>
  </div>

  <div class="status">
    <span class="badge" id="currentBadge">Round 1 / ノーマル</span>
    <span id="desc">集合/散会 + 氷床</span>
  </div>

  <div class="frameShell">
    <iframe id="appFrame" src="normal/round1.html" title="真偽AoE判断 練習アプリ"></iframe>
  </div>

  <div class="footer">
    このツールはFINAL FANTASY XIVの非公式ファンメイド練習ツールです。FINAL FANTASY XIV © SQUARE ENIX
  </div>
</div>

<script>
const state = {
  round: localStorage.getItem("shingiMenuRound") || "1",
  mode: localStorage.getItem("shingiMenuMode") || "normal",
};

const desc = {
  "1": {
    normal: "集合/散会 + 氷床",
    hard: "集合/散会 + 氷床：立ち位置選択"
  },
  "2": {
    normal: "雷 + 氷床",
    hard: "雷 + 氷床：自由クリック"
  },
  "3": {
    normal: "集合/散会 + 雷 + 視線",
    hard: "集合/散会 + 雷 + 視線：立ち位置 + 視線"
  }
};

function filePath(){
  return `${state.mode}/round${state.round}.html`;
}

function render(){
  document.querySelectorAll("[data-round]").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.round === state.round);
  });
  document.querySelectorAll("[data-mode]").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.mode === state.mode);
  });

  const path = filePath();
  const frame = document.getElementById("appFrame");
  if(frame.getAttribute("src") !== path){
    frame.setAttribute("src", path);
  }

  document.getElementById("openLink").setAttribute("href", path);
  document.getElementById("currentBadge").textContent =
    `Round ${state.round} / ${state.mode === "normal" ? "ノーマル" : "ハード"}`;
  document.getElementById("desc").textContent = desc[state.round][state.mode];

  localStorage.setItem("shingiMenuRound", state.round);
  localStorage.setItem("shingiMenuMode", state.mode);
}

document.querySelectorAll("[data-round]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    state.round = btn.dataset.round;
    render();
  });
});
document.querySelectorAll("[data-mode]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    state.mode = btn.dataset.mode;
    render();
  });
});

render();
</script>
</body>
</html>
